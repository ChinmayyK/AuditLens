# ─────────────────────────────────────────────────────────
# Scoring Rules — ShieldSentinel Review Engine
# ─────────────────────────────────────────────────────────
# All scoring parameters are defined here.
# Modify this file to tune scoring — no code changes needed.

# Base deduction points per severity level
severity_weights:
  critical: 25
  high: 15
  medium: 7
  low: 2
  info: 0

# Trust multiplier per scanner tool (0.0–1.0+)
# Higher = more trust in tool's findings = more scoring impact
tool_trust:
  semgrep: 1.0
  bandit: 0.9
  gitleaks: 1.0
  trufflehog: 0.95
  trivy: 0.85
  zap: 0.8
  nuclei: 0.9
  ffuf: 0.6
  nikto: 0.7
  default: 0.8

# Category multiplier — boost/dampen by vulnerability class
# Applied on top of severity × tool_trust
category_multipliers:
  injection: 1.3
  secrets: 1.5
  xss: 1.1
  authentication: 1.2
  authorization: 1.2
  cryptography: 1.0
  misconfiguration: 0.7
  dependency: 0.6
  information_disclosure: 0.5
  default: 1.0

# Category classification — maps vuln_type keywords to categories
# First match wins (case-insensitive)
category_keywords:
  injection:
    - "sql injection"
    - "sqli"
    - "command injection"
    - "code injection"
    - "ldap injection"
    - "xpath injection"
    - "nosql injection"
  secrets:
    - "secret"
    - "api key"
    - "password"
    - "token"
    - "credential"
    - "private key"
    - "hardcoded"
    - "leaked"
  xss:
    - "xss"
    - "cross-site scripting"
    - "reflected"
    - "stored xss"
  authentication:
    - "authentication"
    - "auth bypass"
    - "brute force"
    - "session"
    - "jwt"
  authorization:
    - "authorization"
    - "privilege"
    - "access control"
    - "idor"
    - "insecure direct"
  cryptography:
    - "crypto"
    - "cipher"
    - "ssl"
    - "tls"
    - "hash"
    - "encryption"
    - "weak algorithm"
  misconfiguration:
    - "misconfiguration"
    - "missing header"
    - "cors"
    - "debug"
    - "verbose error"
    - "directory listing"
  dependency:
    - "dependency"
    - "vulnerable package"
    - "outdated"
    - "cve-"
    - "known vulnerability"
  information_disclosure:
    - "information disclosure"
    - "info leak"
    - "path disclosure"
    - "stack trace"
    - "server version"
    - "exposed"

# Boost multiplier for findings that land on changed lines
relevance_boost: 1.5

# Maximum possible score (cap)
max_score: 100

# ── v3: Status-aware scoring ───────────────────────────
# Multiplier based on whether finding is new, existing, or fixed
# New issues in this PR are weighted fully;
# existing issues (pre-existing debt) are dampened;
# fixed issues contribute zero to score.
status_weights:
  new: 1.0
  existing: 0.3
  fixed: 0.0

# ── v3: Change risk multipliers ────────────────────────
# Per-file risk level multiplier.
# High-risk files (auth, crypto, payments) score more.
change_risk_weights:
  critical: 1.5
  high: 1.2
  medium: 1.0
  low: 0.7
  none: 0.5

# ── v3: Cross-tool corroboration ───────────────────────
# When multiple tools agree on same finding, boost confidence.
# Key = number of corroborating tools.
corroboration_boost:
  1: 1.0     # Single tool — no boost
  2: 1.4     # Two tools agree — significant boost
  3: 1.7     # Three+ tools — high confidence
  default: 1.8  # 4+ tools

# Extra weight when a NEW finding lands on changed lines
new_finding_boost: 1.3
